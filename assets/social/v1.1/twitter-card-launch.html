<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { margin:0; font-family: Inter, system-ui, Arial; }
    .card { width:1600px; height:900px; background: radial-gradient(circle at 20% 20%, #173a2a, #0e1118 55%); color:#fff; position:relative; overflow:hidden; }
    .glow { position:absolute; width:700px; height:700px; right:-150px; top:-180px; background: radial-gradient(circle, rgba(61,220,151,.35), transparent 65%); }
    .logo { position:absolute; left:90px; top:80px; width:120px; height:120px; border-radius:28px; border:1px solid rgba(255,255,255,.2); }
    .title { position:absolute; left:240px; top:95px; font-size:64px; font-weight:800; letter-spacing:.5px; }
    .sub { position:absolute; left:240px; top:180px; font-size:30px; color:#9fe5c9; }
    .v { position:absolute; left:90px; top:290px; font-size:120px; font-weight:900; color:#3ddc97; }
    .desc { position:absolute; left:250px; top:310px; width:1200px; font-size:44px; line-height:1.25; font-weight:700; }
    .chips { position:absolute; left:90px; bottom:120px; display:flex; gap:16px; }
    .chip { border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06); color:#d7f8ea; padding:12px 20px; border-radius:999px; font-size:28px; }
    .hash { position:absolute; left:90px; bottom:52px; font-size:26px; color:#9aa6b2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <img class="logo" src="./logo.jpg" />
    <div class="title">Agent Me</div>
    <div class="sub">OpenClaw fork • AI command center</div>
    <div class="v">v1.1</div>
    <div class="desc">Faster UI. Smarter scheduler. Better reliability.<br/>Built for real AI workforce operations.</div>
    <div class="chips">
      <div class="chip">Time-slot Scheduler</div>
      <div class="chip">Backup/Restore UX</div>
      <div class="chip">Ops Log + Retry</div>
    </div>
    <div class="hash">#AgentMe #OpenClaw #AI #Automation</div>
  </div>
</body>
</html>
